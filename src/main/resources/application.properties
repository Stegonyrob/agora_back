
# Core
spring.profiles.active=mysql

# base end-points config
api-endpoint = /api/v1

# Files
spring.servlet.multipart.max-file-size=1000MB
spring.servlet.multipart.max-request-size=1000MB

# Static resources path
spring.mvc.static-path-pattern=/api/v1/**

spring.main.allow-bean-definition-overriding=true

# Access token configuration
access-token.private=${ACCESS_TOKEN_PRIVATE_KEY_PATH}
access-token.public=${ACCESS_TOKEN_PUBLIC_KEY_PATH}

# Refresh token configuration
refresh-token.private=${REFRESH_TOKEN_PRIVATE_KEY_PATH}
refresh-token.public=${REFRESH_TOKEN_PUBLIC_KEY_PATH}

# application.properties
springdoc.show-login-endpoint=true
# Logging level configuration

logging.level.org.springframework.boot=DEBUG
logging.level.org.springframework=DEBUG
logging.level.org.springframework.security.oauth2.jwt=DEBUG

# Habilitar logging para Spring Security
logging.level.org.springframework.security=DEBUG

# Habilitar logging para el controlador
logging.level.org.springframework.web=DEBUG

# Habilitar logging para errores generales
logging.level.root=ERROR

# JWT Claims

# jwt-issuer property removed or replace with a valid property if needed
# jwt-audience property removed because it is unknown and causes errors

# Kafka
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=my-group
spring.kafka.producer.retries=1

# Recaptcha
recaptcha.secret=${RECAPTCHA_SECRET_KEY}
# ==============================
# Instrucciones para Google reCAPTCHA en producción
# ==============================
# 1. Nunca pongas la clave secreta directamente en el código fuente.
# 2. Usa SIEMPRE una variable de entorno o este archivo de configuración para la clave secreta.
# 3. Para desarrollo local, puedes definir aquí:
#    recaptcha.secret=TU_SECRET_KEY_LOCAL
# 4. Para producción, define la variable de entorno RECAPTCHA_SECRET en tu servidor y referencia así:
#    recaptcha.secret=${RECAPTCHA_SECRET}
# 5. Cambia la clave secreta cuando pases a producción.
# 6. No subas nunca la clave secreta real a ningún repositorio público.
# 7. Cambia también la site key en el frontend cuando pases a producción.
# ==============================
# ==============================
# Instrucciones para obtener y configurar Google reCAPTCHA
# ==============================
# 1. Ve a la consola de administración de reCAPTCHA:
#    https://www.google.com/recaptcha/admin/create
#
# 2. Registra tu sitio:
#    - Pon un nombre para tu proyecto.
#    - Elige el tipo de reCAPTCHA (recomendado: v2 "No soy un robot" o v3).
#    - Añade los dominios donde usarás el captcha (por ejemplo, localhost para pruebas y tu dominio real para producción).
#    - Acepta los términos y haz clic en Enviar.
#
# 3. Obtén tus claves:
#    - Site key: para el frontend (React).
#    - Secret key: para el backend (Spring Boot).
#
# 4. Guarda la secret key:
#    - Pon la secret key en tu application.properties o como variable de entorno, nunca en el código fuente.
# ==============================