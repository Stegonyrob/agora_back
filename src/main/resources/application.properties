# Core
spring.profiles.active=mysql

# base end-points config
api-endpoint = /api/v1

# Files
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=1000MB
spring.servlet.multipart.max-request-size=1000MB

# Static resources path - now handled by WebMvcConfig.java
# spring.mvc.static-path-pattern=/temp_images/**

spring.main.allow-bean-definition-overriding=true

jwt-issuer=agora-backend
jwt-audience=agora-frontend
# Access token configuration
access-token.private=${ACCESS_TOKEN_PRIVATE_KEY_PATH:src/main/java/de/stella/agora_web/auth/keys/access-token-private.key}
access-token.public=${ACCESS_TOKEN_PUBLIC_KEY_PATH:src/main/java/de/stella/agora_web/auth/keys/access-token-public.key}

# Refresh token configuration
refresh-token.enabled=true
refresh-token.expiration=604800 # 7 days in seconds
refresh-token.private=${REFRESH_TOKEN_PRIVATE_KEY_PATH:src/main/java/de/stella/agora_web/auth/keys/refresh-token-private.key}
refresh-token.public=${REFRESH_TOKEN_PUBLIC_KEY_PATH:src/main/java/de/stella/agora_web/auth/keys/refresh-token-public.key}

# application.properties
springdoc.show-login-endpoint=true

# Logging level configuration
logging.level.org.springframework.boot=INFO
logging.level.org.hibernate=WARN
logging.level.org.springframework.orm.jpa=DEBUG
logging.level.de.stella.agora_web=DEBUG

# JPA/Hibernate optimizations (simplified)
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Enable Hibernate query plan cache
spring.jpa.properties.hibernate.query.plan_cache_max_size=2048

# Second level cache (optional - requires cache provider like EhCache)
# spring.jpa.properties.hibernate.cache.use_second_level_cache=true
# spring.jpa.properties.hibernate.cache.region.factory_class=org.hibernate.cache.jcache.JCacheRegionFactory
logging.level.org.springframework=DEBUG
logging.level.org.springframework.security.oauth2.jwt=DEBUG

# Habilitar logging para Spring Security
logging.level.org.springframework.security=DEBUG

# Habilitar logging para el controlador
logging.level.org.springframework.web=DEBUG

# Habilitar logging para errores generales
logging.level.root=ERROR


# Forzar codificación en inicialización SQL
spring.sql.init.encoding=UTF-8
logging.level.org.springframework.jdbc.datasource.init.ScriptUtils=DEBUG

# spring.datasource.url=jdbc:mysql://localhost:3306/your_database?useUnicode=true&characterEncoding=utf8
# spring.jpa.properties.hibernate.show_sql=true
# spring.jpa.properties.hibernate.format_sql=true
# spring.web.resources.static-locations=file:D:/GITHUB/ÁGORA/Proyecto Personal/agora_back/temp_images/ - now handled by WebMvcConfig.java

# Kafka Configuration
kafka.enabled=true
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=agora-comment-group
spring.kafka.producer.retries=1
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# ==============================
# Instrucciones para Google reCAPTCHA en producción
# ==============================
# 1. Nunca pongas la clave secreta directamente en el código fuente.
# 2. Usa SIEMPRE una variable de entorno o este archivo de configuración para la clave secreta.
# 3. Para desarrollo local, puedes definir aquí:
#    recaptcha.secret=TU_SECRET_KEY_LOCAL
# 4. Para producción, define la variable de entorno RECAPTCHA_SECRET en tu servidor y referencia así:
#    recaptcha.secret=${RECAPTCHA_SECRET}
# 5. Cambia la clave secreta cuando pases a producción.
# 6. No subas nunca la clave secreta real a ningún repositorio público.
# 7. Cambia también la site key en el frontend cuando pases a producción.
# ==============================
# ==============================