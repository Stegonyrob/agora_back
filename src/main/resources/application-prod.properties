# Configuración para producción
# NOTA: No se puede definir spring.profiles.active en un archivo de perfil específico

# ==============================
# CONFIGURACIÓN DE IMÁGENES - PRODUCCIÓN CLOUD
# ==============================
app.load-images=false
app.environment=prod

# Cloud Storage - AWS S3
cloud.storage.enabled=true
aws.s3.bucket-name=${S3_BUCKET_NAME:agora-production-images}
aws.s3.region=${AWS_REGION:eu-west-1}

# CloudFront CDN (opcional pero recomendado)
aws.cloudfront.domain=${CLOUDFRONT_DOMAIN:}

# Configuración de base de datos - CAMBIAR EN PRODUCCIÓN
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/agora_db}
spring.datasource.username=${DATABASE_USERNAME:agora_user}
spring.datasource.password=${DATABASE_PASSWORD:secure_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Configuración de archivos - LIMITAR EN PRODUCCIÓN
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Security - JWT Configuration
access-token.private=${ACCESS_TOKEN_PRIVATE_KEY_PATH}
access-token.public=${ACCESS_TOKEN_PUBLIC_KEY_PATH}
refresh-token.private=${REFRESH_TOKEN_PRIVATE_KEY_PATH}
refresh-token.public=${REFRESH_TOKEN_PUBLIC_KEY_PATH}

# Logging - REDUCIR EN PRODUCCIÓN
logging.level.org.springframework.boot=WARN
logging.level.org.springframework=WARN
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security.oauth2.jwt=WARN

# Server configuration
server.port=${PORT:8080}
server.servlet.context-path=/

# CORS - CONFIGURAR DOMINIOS ESPECÍFICOS EN PRODUCCIÓN
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://agora.es,https://www.agora.es}

# Rate limiting (si se implementa)
app.rate-limit.requests-per-minute=60

# Session timeout
server.servlet.session.timeout=30m

# ==============================
# NOTIFICACIONES - Admin email
# ==============================
app.admin.email=${ADMIN_EMAIL:admin@agora.es}

# ==============================
# SMTP — AWS SES (región eu-west-1)
# Requiere credenciales SMTP de SES (no las credenciales IAM generales)
# Generarlas en: AWS Console → SES → SMTP Settings → Create SMTP credentials
# ==============================
spring.mail.host=email-smtp.eu-west-1.amazonaws.com
spring.mail.port=587
spring.mail.username=${SES_SMTP_USERNAME}
spring.mail.password=${SES_SMTP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
