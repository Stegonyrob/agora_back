# ==============================
# CONFIGURACIÓN DE TESTING/STAGING
# ==============================
app.load-images=true
app.environment=staging

# Base de datos para staging (mismo que MySQL pero con datos completos)
spring.datasource.url=jdbc:mysql://localhost:3306/agora_staging
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration para staging
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.defer-datasource-initialization=true

# Logging más controlado
logging.level.root=WARN
logging.level.de.stella.agora_web=INFO
