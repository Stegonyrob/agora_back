# Configuración específica para desarrollo
# NOTA: No se puede definir spring.profiles.active en un archivo de perfil específico

# ==============================
# CONFIGURACIÓN DE IMÁGENES - DESARROLLO
# ==============================
app.load-images=false
app.environment=dev

# Banner y logging para desarrollo
# Banner configurado en application.properties principal
logging.level.root=INFO
logging.level.de.stella.agora_web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
# Reducir logs de Kafka para evitar spam
logging.level.org.springframework.kafka=WARN
logging.level.org.apache.kafka=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Base de datos H2 para desarrollo rápido
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA Configuration para desarrollo
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

# Configuración de archivos más permisiva en desarrollo
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# JWT Configuration para desarrollo (con valores por defecto)
access-token.private=src/main/java/de/stella/agora_web/auth/keys/access-token-private.key
access-token.public=src/main/java/de/stella/agora_web/auth/keys/access-token-public.key
refresh-token.private=src/main/java/de/stella/agora_web/auth/keys/refresh-token-private.key
refresh-token.public=src/main/java/de/stella/agora_web/auth/keys/refresh-token-public.key

# Server configuration para desarrollo
server.port=8080
server.servlet.context-path=/

# Desactivar algunas validaciones en desarrollo
spring.jpa.properties.hibernate.validator.apply_to_ddl=false
