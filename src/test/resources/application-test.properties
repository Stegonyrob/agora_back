# Configuración de base de datos en memoria para pruebas
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=true

# Puerto del servidor para pruebas
server.port=0

# Configuración básica para tests
api-endpoint=/api/v1

# ==============================
# 📧 EMAIL DE ADMIN - TESTS
# ==============================
# Email de prueba para tests
admin.email=admin.test@gmail.com

# Configuración de logging para pruebas
logging.level.org.springframework=WARN
logging.level.de.stella.agora_web=INFO
logging.level.org.hibernate=WARN
logging.level.org.springframework.security=WARN

# Desactivar configuraciones complejas en tests
spring.h2.console.enabled=false
spring.jpa.show-sql=false

# JWT configuración para tests
jwt-issuer=test-issuer
jwt-audience=test-audience

# Deshabilitar Kafka completamente para tests
spring.kafka.enabled=false
kafka.enabled=false
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration,org.springframework.kafka.annotation.KafkaListenerConfigurationSelector
spring.kafka.bootstrap-servers=
spring.kafka.consumer.bootstrap-servers=
spring.kafka.producer.bootstrap-servers=

# Files configuration for tests
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Security configurations for tests
access-token.private=classpath:test-access-token-private.key
access-token.public=classpath:test-access-token-public.key
refresh-token.enabled=false

# Test specific
spring.main.allow-bean-definition-overriding=true