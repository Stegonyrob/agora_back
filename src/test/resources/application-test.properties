# Configuración de base de datos en memoria para pruebas
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=true

# Puerto del servidor para pruebas
server.port=0

# Configuración básica para tests
api-endpoint=/api/v1

# Configuración de logging para pruebas
logging.level.org.springframework=WARN
logging.level.de.stella.agora_web=INFO
logging.level.org.hibernate=WARN

# Desactivar configuraciones complejas en tests
spring.h2.console.enabled=false
spring.jpa.show-sql=false

# Files configuration for tests
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Security configurations for tests
access-token.private=classpath:test-access-token-private.key
access-token.public=classpath:test-access-token-public.key
refresh-token.enabled=false

# Test specific
spring.main.allow-bean-definition-overriding=true